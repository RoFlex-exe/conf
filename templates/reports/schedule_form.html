<!-- templates/reports/schedule_form.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Создание запланированного отчёта{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-clock"></i> Создание запланированного отчёта</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> Функция запланированных отчётов находится в разработке.
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="{% url 'reports:scheduled' %}" class="btn btn-secondary">
                            <i class="bi bi-x"></i> Отмена
                        </a>
                        <button type="submit" class="btn btn-primary" disabled>
                            <i class="bi bi-clock"></i> Создать
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
